<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <h1>Call Anonymizer</h1>

    <label class="toggle-row">
      <input type="checkbox" id="enabled" />
      <span id="enabled-label">Anonymize voice &amp; face</span>
    </label>

    <label class="slider-row">
      Voice pitch shift: <span id="pitch-value"></span> semitones
      <input type="range" id="pitch" min="-12" max="12" step="1" />
    </label>

    <label class="select-row">
      Face distortion mode
      <select id="mode">
        <option value="blur">Blur</option>
        <option value="pixelate">Pixelate</option>
        <option value="puzzle">Puzzle scramble</option>
        <option value="glitch">Glitch</option>
      </select>
    </label>

    <label class="slider-row" id="intensity-row">
      Distortion intensity: <span id="intensity-value"></span>
      <input type="range" id="intensity" min="0" max="40" step="2" />
    </label>

    <label class="slider-row" id="puzzle-row">
      Puzzle grid: <span id="puzzle-grid-value"></span> x <span id="puzzle-grid-value-2"></span>
      <input type="range" id="puzzle-grid" min="2" max="6" step="1" />
    </label>

    <button type="button" id="reshuffle" class="secondary-row">Reshuffle puzzle</button>

    <p class="hint">
      Changes apply live to your current call. Reload the tab if you don't
      see an effect. Shortcut: <kbd>Alt+Shift+A</kbd> toggles anonymization
      without opening this popup.
    </p>

    <script src="popup.js"></script>
  </body>
</html>
